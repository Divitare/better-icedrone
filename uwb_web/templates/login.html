<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — UWB Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            width: 360px;
            max-width: 90vw;
        }
        .login-box h1 { text-align: center; margin-bottom: 24px; }
        .login-box .form-group { margin-bottom: 16px; }
        .login-box label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 13px; }
        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%; padding: 8px 12px;
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 14px;
        }
        .login-box .btn { width: 100%; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>UWB Web</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Log in</button>
        </form>
    </div>
</body>
</html>
